<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>לוח מבחנים ואירועים</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts (Heebo & Inter) -->
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <style>
        body {
            font-family: 'Heebo', 'Inter', sans-serif;
        }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen selection:bg-indigo-500 selection:text-white" 
      x-data="app()" 
      x-init="initApp()">

    <!-- פאנל עליון / כותרת ראשית -->
    <header class="border-b border-slate-800 bg-slate-900/80 backdrop-blur sticky top-0 z-40 px-4 py-4">
        <div class="max-w-6xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-gradient-to-tr from-indigo-500 to-violet-500 p-2.5 rounded-xl text-white shadow-lg shadow-indigo-500/25">
                    <i class="fa-solid fa-calendar-days text-xl animate-pulse"></i>
                </div>
                <div>
                    <h1 class="text-xl sm:text-2xl font-black tracking-tight bg-gradient-to-r from-white via-slate-200 to-indigo-300 bg-clip-text text-transparent">
                        לוח מבחנים ואירועים
                    </h1>
                </div>
            </div>

            <!-- החלפת מצב תצוגה -->
            <div class="flex bg-slate-800 border border-slate-700 p-1 rounded-xl shrink-0">
                <button @click="viewMode = 'calendar'"
                        :class="viewMode === 'calendar' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-400 hover:text-slate-200'"
                        class="flex items-center gap-2 px-4 py-1.5 text-xs font-bold rounded-lg transition-all duration-200">
                    <i class="fa-solid fa-calendar"></i>
                    לוח שנה
                </button>
                <button @click="viewMode = 'list'"
                        :class="viewMode === 'list' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-400 hover:text-slate-200'"
                        class="flex items-center gap-2 px-4 py-1.5 text-xs font-bold rounded-lg transition-all duration-200">
                    <i class="fa-solid fa-list"></i>
                    רשימה כרונולוגית
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-6">

        <!-- פאנל בחירת שכבה וכיתה -->
        <section class="bg-slate-900 border border-slate-800/80 rounded-2xl p-5 mb-6 flex flex-col md:flex-row gap-5 items-stretch md:items-center justify-between">
            <div class="flex flex-col sm:flex-row gap-4 flex-1">
                <!-- בחירת שכבה -->
                <div class="flex-1 max-w-xs">
                    <label class="block text-xs font-bold text-slate-400 mb-2">שכבה:</label>
                    <div class="relative">
                        <select x-model="selectedGrade" @change="onGradeChange()"
                                class="w-full pr-4 pl-10 py-2.5 bg-slate-800 border border-slate-700 rounded-xl text-sm font-semibold text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 appearance-none cursor-pointer">
                            <template x-for="g in grades" :key="g.id">
                                <option :value="g.id" x-text="'שכבת ' + g.id"></option>
                            </template>
                        </select>
                        <div class="absolute inset-y-0 left-3 flex items-center pointer-events-none text-slate-500">
                            <i class="fa-solid fa-chevron-down text-xs"></i>
                        </div>
                    </div>
                </div>

                <!-- בחירת כיתה -->
                <div class="flex-1 max-w-xs">
                    <label class="block text-xs font-bold text-slate-400 mb-2">כיתה:</label>
                    <div class="relative">
                        <select x-model="selectedClass" @change="updateData()"
                                class="w-full pr-4 pl-10 py-2.5 bg-slate-800 border border-slate-700 rounded-xl text-sm font-semibold text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 appearance-none cursor-pointer">
                            <option value="הכל">כל השכבה</option>
                            <template x-for="cls in availableClasses" :key="cls">
                                <option :value="cls" x-text="cls"></option>
                            </template>
                        </select>
                        <div class="absolute inset-y-0 left-3 flex items-center pointer-events-none text-slate-500">
                            <i class="fa-solid fa-chevron-down text-xs"></i>
                        </div>
                    </div>
                </div>
            </div>

            <!-- סנכרון ואינדקציה -->
            <div class="flex items-center justify-between md:justify-end gap-3 border-t md:border-t-0 pt-4 md:pt-0">
                <template x-if="lastRefreshed">
                    <span class="bg-indigo-950/40 text-indigo-300 border border-indigo-900/40 px-3.5 py-1.5 rounded-xl text-xs font-semibold flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                        עודכן: <span x-text="lastRefreshed"></span>
                    </span>
                </template>
                <button @click="fetchData(true)" :disabled="loading"
                        class="p-2.5 bg-slate-800 hover:bg-slate-700 text-slate-300 hover:text-white rounded-xl transition-all duration-200 border border-slate-700 disabled:opacity-50">
                    <i class="fa-solid fa-arrows-rotate" :class="loading ? 'animate-spin' : ''"></i>
                </button>
            </div>
        </section>

        <!-- מסך טעינה -->
        <div x-show="loading" class="bg-slate-900 border border-slate-800/80 rounded-2xl p-12 text-center my-6">
            <div class="inline-block animate-spin rounded-full h-10 w-10 border-4 border-indigo-500 border-t-transparent mb-4"></div>
            <p class="text-slate-300 font-bold">טוען ומסנכרן את נתוני המבחנים מכל השכבות...</p>
        </div>

        <!-- הצגת שגיאה -->
        <div x-show="error" x-cloak class="bg-rose-950/30 border border-rose-900/50 rounded-2xl p-6 mb-6 text-rose-300 flex items-start gap-3">
            <i class="fa-solid fa-circle-exclamation text-xl shrink-0 mt-0.5"></i>
            <div>
                <h4 class="font-bold text-md mb-1">שגיאה בסנכרון הקובץ</h4>
                <p class="text-sm opacity-90" x-text="error"></p>
            </div>
        </div>

        <!-- אזור התצוגות הראשיות -->
        <div x-show="!loading && !error" x-cloak>
            
            <!-- פקדי ניווט חודשים (מוצג רק בלוח שנה) -->
            <div x-show="viewMode === 'calendar'" class="flex justify-between items-center bg-slate-900 border border-slate-800/80 rounded-2xl px-5 py-3.5 mb-6">
                <button @click="changeMonth(-1)"
                        class="p-2 rounded-xl border border-slate-800 hover:bg-slate-800 text-slate-300 hover:text-white transition duration-200">
                    <i class="fa-solid fa-chevron-right"></i>
                </button>
                <h2 class="text-md sm:text-lg font-bold text-slate-100 flex items-center gap-2">
                    <i class="fa-solid fa-calendar-day text-indigo-400"></i>
                    <span x-text="currentMonthName"></span>
                </h2>
                <button @click="changeMonth(1)"
                        class="p-2 rounded-xl border border-slate-800 hover:bg-slate-800 text-slate-300 hover:text-white transition duration-200">
                    <i class="fa-solid fa-chevron-left"></i>
                </button>
            </div>

            <!-- תצוגה 1: לוח שנה חודשי -->
            <div x-show="viewMode === 'calendar'" class="bg-slate-900 border border-slate-800/80 rounded-2xl overflow-hidden shadow-xl">
                <!-- ימי השבוע -->
                <div class="grid grid-cols-7 border-b border-slate-800 bg-slate-800/30 text-center text-xs font-bold text-slate-300 py-3.5">
                    <div>ראשון</div>
                    <div>שני</div>
                    <div>שלישי</div>
                    <div>רביעי</div>
                    <div>חמישי</div>
                    <div>שישי</div>
                    <div class="text-slate-500">שבת</div>
                </div>

                <!-- גריד הימים -->
                <div class="grid grid-cols-7 bg-slate-950 gap-px">
                    <template x-for="day in calendarDays" :key="day ? day.dateStr : Math.random()">
                        <div class="min-h-[110px] p-2 bg-slate-900 transition-all flex flex-col justify-between border-t border-slate-800/30 relative"
                             :class="day ? 'hover:bg-slate-800/40 cursor-pointer' : 'bg-slate-950/20'">
                            
                            <template x-if="day">
                                <div class="w-full">
                                    <div class="flex justify-between items-center">
                                        <span class="text-xs font-bold text-slate-400" x-text="day.dayNum"></span>
                                        <div class="flex gap-1">
                                            <template x-if="day.holiday">
                                                <span class="h-1.5 w-1.5 rounded-full bg-amber-500"></span>
                                            </template>
                                            <template x-if="day.exams && Object.keys(day.exams).length > 0">
                                                <span class="h-1.5 w-1.5 rounded-full bg-red-500"></span>
                                            </template>
                                        </div>
                                    </div>

                                    <!-- אירועים / חגים -->
                                    <div class="mt-2 space-y-1">
                                        <template x-if="day.holiday">
                                            <div class="text-[10px] bg-amber-950/40 text-amber-300 border border-amber-900/30 rounded px-1.5 py-0.5 font-medium truncate"
                                                 :title="day.holiday">
                                                 🎉 <span x-text="day.holiday"></span>
                                            </div>
                                        </template>

                                        <!-- מבחנים לפי סינון כיתה -->
                                        <template x-for="exam in getExamsForDay(day)" :key="exam.className">
                                            <div class="text-[10px] bg-red-950/40 text-red-300 border border-red-900/30 rounded px-1.5 py-0.5 font-bold truncate"
                                                 :title="exam.className + ': ' + exam.subject">
                                                 📝 <span x-text="exam.className + ': ' + exam.subject"></span>
                                            </div>
                                        </template>
                                    </div>
                                </div>
                            </template>

                        </div>
                    </template>
                </div>
            </div>

            <!-- תצוגה 2: רשימה כרונולוגית -->
            <div x-show="viewMode === 'list'" class="space-y-4">
                <template x-for="event in filteredEvents" :key="event.dateStr">
                    <div class="bg-slate-900 border border-slate-800/80 rounded-2xl p-4 hover:border-indigo-500/40 transition duration-200 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <div class="flex items-start gap-4">
                            <!-- תאריך -->
                            <div class="bg-slate-800 border border-slate-700/80 rounded-xl p-2.5 text-center min-w-[75px] shrink-0">
                                <span class="text-xs text-slate-400 block font-medium" x-text="event.day"></span>
                                <span class="text-md font-bold text-indigo-300" x-text="formatDateShort(event.dateStr)"></span>
                            </div>

                            <!-- פירוט האירוע -->
                            <div class="space-y-1.5">
                                <template x-if="event.holiday">
                                    <span class="inline-flex items-center gap-1 text-[11px] font-bold bg-amber-950/40 text-amber-300 border border-amber-900/30 px-2.5 py-0.5 rounded-full">
                                        🎉 <span x-text="event.holiday"></span>
                                    </span>
                                </template>

                                <div class="space-y-1">
                                    <template x-for="exam in getExamsForDay(event)" :key="exam.className">
                                        <div class="text-sm font-bold text-slate-100 flex items-center gap-2">
                                            <i class="fa-solid fa-file-signature text-red-400"></i>
                                            <span x-text="'מבחן ב-' + exam.subject + ' (' + exam.className + ')'"></span>
                                        </div>
                                    </template>
                                    <template x-if="!event.holiday && getExamsForDay(event).length === 0">
                                        <div class="text-xs text-slate-500 italic">אין אירועים רשמיים ביום זה</div>
                                    </template>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>
                <template x-if="filteredEvents.length === 0">
                    <div class="bg-slate-900 border border-slate-800/80 rounded-2xl p-12 text-center text-slate-400">
                        <i class="fa-solid fa-calendar-xmark text-2xl mb-2 text-slate-600"></i>
                        <p>לא נמצאו מבחנים או אירועים עבור הסינון שנבחר.</p>
                    </div>
                </template>
            </div>

        </div>

    </main>

    <!-- JS Logic -->
    <script>
        function app() {
            return {
                spreadsheetId: "1TIwnott9Y7pTugeQ5Il-U00dUe5GE6Mcc7lRqfxuCBM",
                grades: [
                    { id: 'ט', name: "שכבת ט'" },
                    { id: 'י', name: "שכבת י'" },
                    { id: 'יא', name: "שכבת יא'" },
                    { id: 'יב', name: "שכבת יב'" }
                ],
                selectedGrade: 'ט',
                selectedClass: 'הכל',
                viewMode: 'calendar',
                loading: true,
                error: null,
                lastRefreshed: null,
                
                allEvents: [],
                gradeClasses: { 'ט': [], 'י': [], 'יא': [], 'יב': [] },
                
                currentDate: new Date(2026, 8, 1), // ברירת מחדל: ספטמבר 2026
                currentMonthName: '',
                calendarDays: [],
                filteredEvents: [],

                initApp() {
                    this.fetchData();
                    setInterval(() => this.fetchData(), 1800000); // רענון חצי שעה
                },

                async fetchData(force = false) {
                    this.loading = true;
                    this.error = null;

                    try {
                        const fetchPromises = this.grades.map(async (grade) => {
                            // שימוש ב-gviz/tq כדי למנוע בעיות CORS ולשלוף לפי שם כרטיסייה
                            const url = `https://docs.google.com/spreadsheets/d/${this.spreadsheetId}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(grade.name)}`;
                            const response = await fetch(url);
                            if (!response.ok) throw new Error(`נכשל בטעינת ${grade.name}`);
                            const csvText = await response.text();
                            
                            const rows = parseCSV(csvText);
                            if (rows.length < 2) return;

                            const headers = rows[0].map(h => h ? h.trim() : '');
                            
                            // מיפוי עמודות בסיסיות
                            const dateIdx = headers.findIndex(h => h.includes('תאריך') || h.toLowerCase().includes('date'));
                            const dayIdx = headers.findIndex(h => h.includes('יום') || h.toLowerCase().includes('day'));
                            const holidayIdx = headers.findIndex(h => h.includes('חג') || h.includes('מועד') || h.includes('אירוע'));

                            // עמודות כיתות (מעמודה 5 ומעלה)
                            const classCols = [];
                            this.gradeClasses[grade.id] = [];
                            for (let i = 4; i < headers.length; i++) {
                                if (headers[i]) {
                                    classCols.push({ index: i, name: headers[i] });
                                    this.gradeClasses[grade.id].push(headers[i]);
                                }
                            }

                            const getVal = (row, idx) => idx !== -1 && row[idx] ? row[idx].trim() : '';

                            const events = rows.slice(1)
                                .filter(row => row.length > 1 && row[dateIdx])
                                .map(row => {
                                    const dateStr = getVal(row, dateIdx);
                                    let parsedDate = null;
                                    if (dateStr) {
                                        const parts = dateStr.split(/[\/\-\.]/);
                                        if (parts.length >= 2) {
                                            const day = parseInt(parts[0], 10);
                                            const month = parseInt(parts[1], 10) - 1;
                                            const year = parts[2] ? parseInt(parts[2], 10) : new Date().getFullYear();
                                            const fullYear = year < 100 ? 2000 + year : year;
                                            parsedDate = new Date(fullYear, month, day);
                                        }
                                    }

                                    // תנאי: לפחות אחת מהעמודות 5 עד 9 (עמודות הכיתה, מדדי עמודה 4 עד 8) אינה ריקה, או שיש חג/מועד
                                    let hasExam = false;
                                    const exams = {};
                                    classCols.forEach(col => {
                                        const examSub = row[col.index] ? row[col.index].trim() : '';
                                        if (examSub) {
                                            hasExam = true;
                                            exams[col.name] = examSub;
                                        }
                                    });

                                    const holiday = getVal(row, holidayIdx);
                                    const hasHoliday = !!holiday;

                                    // מסננים החוצה שורות ריקות לגמרי (ללא מבחנים באף אחת מעמודות הכיתה וללא חג)
                                    if (!hasExam && !hasHoliday) {
                                        return null;
                                    }

                                    return {
                                        grade: grade.id,
                                        dateStr,
                                        date: parsedDate,
                                        day: getVal(row, dayIdx),
                                        holiday: holiday,
                                        exams
                                    };
                                });

                            return events.filter(Boolean);
                        });

                        const results = await Promise.all(fetchPromises);
                        this.allEvents = results.flat().filter(Boolean);
                        
                        this.lastRefreshed = new Date().toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' });
                        this.updateData();
                    } catch (err) {
                        console.error(err);
                        this.error = "לא הצלחנו למשוך את הנתונים ישירות מהקובץ. ודאו שהקובץ פתוח לשיתוף ציבורי ואינו חסום.";
                    } finally {
                        this.loading = false;
                    }
                },

                get availableClasses() {
                    return this.gradeClasses[this.selectedGrade] || [];
                },

                onGradeChange() {
                    this.selectedClass = 'הכל';
                    this.updateData();
                },

                updateData() {
                    this.filteredEvents = this.allEvents.filter(event => {
                        if (event.grade !== this.selectedGrade) return false;
                        
                        // סינון לפי כיתה נבחרת
                        if (this.selectedClass !== 'הכל') {
                            const hasExam = !!event.exams[this.selectedClass];
                            const hasHoliday = !!event.holiday;
                            return hasExam || hasHoliday;
                        }
                        return true;
                    });

                    this.buildCalendar();
                },

                buildCalendar() {
                    const year = this.currentDate.getFullYear();
                    const month = this.currentDate.getMonth();
                    
                    this.currentMonthName = this.currentDate.toLocaleString('he-IL', { month: 'long', year: 'numeric' });

                    const firstDay = new Date(year, month, 1).getDay();
                    const totalDays = new Date(year, month + 1, 0).getDate();
                    
                    const days = [];
                    // ימים ריקים מתחילת החודש
                    for (let i = 0; i < firstDay; i++) {
                        days.push(null);
                    }

                    // ימי החודש האמיתיים
                    for (let d = 1; d <= totalDays; d++) {
                        const dateStr = `${d}/${month + 1}/${year}`;
                        
                        // חיפוש אירוע רלוונטי
                        const foundEvent = this.filteredEvents.find(e => {
                            if (!e.date) return false;
                            return e.date.getDate() === d && e.date.getMonth() === month && e.date.getFullYear() === year;
                        });

                        days.push({
                            dayNum: d,
                            dateStr,
                            holiday: foundEvent ? foundEvent.holiday : '',
                            exams: foundEvent ? foundEvent.exams : {}
                        });
                    }

                    this.calendarDays = days;
                },

                changeMonth(offset) {
                    this.currentDate.setMonth(this.currentDate.getMonth() + offset);
                    this.buildCalendar();
                },

                getExamsForDay(day) {
                    if (!day || !day.exams) return [];
                    const examsList = [];
                    if (this.selectedClass === 'הכל') {
                        Object.entries(day.exams).forEach(([cls, sub]) => {
                            examsList.push({ className: cls, subject: sub });
                        });
                    } else if (day.exams[this.selectedClass]) {
                        examsList.push({ className: this.selectedClass, subject: day.exams[this.selectedClass] });
                    }
                    return examsList;
                },

                formatDateShort(dateStr) {
                    if (!dateStr) return '';
                    const parts = dateStr.split(/[\/\-\.]/);
                    if (parts.length >= 2) {
                        return `${parts[0]}/${parts[1]}`;
                    }
                    return dateStr;
                }
            };
        }

        // פארסר CSV
        function parseCSV(text) {
            const lines = [];
            let row = [""];
            let insideQuote = false;

            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const nextChar = text[i + 1];

                if (char === '"') {
                    if (insideQuote && nextChar === '"') {
                        row[row.length - 1] += '"';
                        i++;
                    } else {
                        insideQuote = !insideQuote;
                    }
                } else if (char === ',' && !insideQuote) {
                    row.push('');
                } else if ((char === '\r' || char === '\n') && !insideQuote) {
                    if (char === '\r' && nextChar === '\n') i++;
                    lines.push(row);
                    row = [""];
                } else {
                    row[row.length - 1] += char;
                }
            }
            if (row.length > 1 || row[0] !== '') {
                lines.push(row);
            }
            return lines;
        }
    </script>

</body>
</html>

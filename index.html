<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>לוח מבחנים ואירועים</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts (Heebo) -->
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <style>
        body {
            font-family: 'Heebo', sans-serif;
        }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen selection:bg-indigo-500 selection:text-white" 
      x-data="app()" 
      x-init="initApp()">

    <!-- פאנל עליון / כותרת ראשית -->
    <header class="border-b border-slate-800 bg-slate-900/80 backdrop-blur sticky top-0 z-40 px-4 py-4">
        <div class="max-w-4xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-gradient-to-tr from-indigo-500 to-violet-500 p-2.5 rounded-xl text-white shadow-lg shadow-indigo-500/25">
                    <i class="fa-solid fa-list-check text-xl"></i>
                </div>
                <div>
                    <h1 class="text-xl sm:text-2xl font-black tracking-tight bg-gradient-to-r from-white via-slate-200 to-indigo-300 bg-clip-text text-transparent">
                        לוח מבחנים שכבתי
                    </h1>
                    <p class="text-xs text-slate-400 mt-0.5">מסתנכרן בזמן אמת מול קובץ הניהול הבית-ספרי</p>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-6">

        <!-- פאנל סינונים ופקדים -->
        <section class="bg-slate-900 border border-slate-800/80 rounded-2xl p-5 mb-6 space-y-5">
            <div class="flex flex-col md:flex-row gap-5 items-stretch md:items-center justify-between">
                <div class="flex flex-col sm:flex-row gap-4 flex-1">
                    <!-- בחירת שכבה -->
                    <div class="flex-1 max-w-xs">
                        <label class="block text-xs font-bold text-slate-400 mb-2">שכבה:</label>
                        <div class="relative">
                            <select x-model="selectedGrade" @change="onGradeChange()"
                                    class="w-full pr-4 pl-10 py-2.5 bg-slate-800 border border-slate-700 rounded-xl text-sm font-semibold text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 appearance-none cursor-pointer transition">
                                <option value="כלל בית הספר">כלל בית הספר</option>
                                <template x-for="g in grades" :key="g.id">
                                    <option :value="g.id" x-text="'שכבת ' + g.id"></option>
                                </template>
                            </select>
                            <div class="absolute inset-y-0 left-3 flex items-center pointer-events-none text-slate-500">
                                <i class="fa-solid fa-chevron-down text-xs"></i>
                            </div>
                        </div>
                    </div>

                    <!-- בחירת כיתה -->
                    <div class="flex-1 max-w-xs">
                        <label class="block text-xs font-bold text-slate-400 mb-2" 
                               :class="isClassDisabled ? 'opacity-40' : ''">כיתה:</label>
                        <div class="relative" :class="isClassDisabled ? 'opacity-40' : ''">
                            <select x-model="selectedClass" @change="updateData()" :disabled="isClassDisabled"
                                    class="w-full pr-4 pl-10 py-2.5 bg-slate-800 border border-slate-700 rounded-xl text-sm font-semibold text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 appearance-none cursor-pointer disabled:cursor-not-allowed transition">
                                <option value="כל השכבה">כל השכבה</option>
                                <template x-for="cls in availableClasses" :key="cls">
                                    <option :value="cls" x-text="cls"></option>
                                </template>
                            </select>
                            <div class="absolute inset-y-0 left-3 flex items-center pointer-events-none text-slate-500">
                                <i class="fa-solid fa-chevron-down text-xs"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- סנכרון ואינדקציה -->
                <div class="flex items-center justify-between md:justify-end gap-3 border-t md:border-t-0 pt-4 md:pt-0">
                    <template x-if="lastRefreshed">
                        <span class="bg-indigo-950/40 text-indigo-300 border border-indigo-900/40 px-3.5 py-1.5 rounded-xl text-xs font-semibold flex items-center gap-2">
                            <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                            עודכן: <span x-text="lastRefreshed"></span>
                        </span>
                    </template>
                    <button @click="fetchData(true)" :disabled="loading"
                            class="p-2.5 bg-slate-800 hover:bg-slate-700 text-slate-300 hover:text-white rounded-xl transition-all duration-200 border border-slate-700 disabled:opacity-50">
                        <i class="fa-solid fa-arrows-rotate" :class="loading ? 'animate-spin' : ''"></i>
                    </button>
                </div>
            </div>

            <!-- פקד בחירה להצגת חגים וחופשות -->
            <div class="pt-3 border-t border-slate-800/60 flex items-center">
                <label class="flex items-center gap-3 cursor-pointer group select-none">
                    <div class="relative">
                        <input type="checkbox" x-model="showHolidays" @change="updateData()" class="sr-only peer">
                        <div class="w-10 h-6 bg-slate-800 rounded-full peer peer-focus:ring-2 peer-focus:ring-indigo-500 peer-checked:after:-translate-x-full after:content-[''] after:absolute after:top-1 after:right-1 after:bg-slate-400 peer-checked:after:bg-indigo-400 after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-indigo-950/80 border border-slate-700 peer-checked:border-indigo-500"></div>
                    </div>
                    <span class="text-xs sm:text-sm font-semibold text-slate-300 group-hover:text-slate-100 transition">
                        הצג חגים, אירועים וחופשות בית ספריות
                    </span>
                </label>
            </div>
        </section>

        <!-- מסך טעינה -->
        <div x-show="loading" class="bg-slate-900 border border-slate-800/80 rounded-2xl p-12 text-center my-6">
            <div class="inline-block animate-spin rounded-full h-10 w-10 border-4 border-indigo-500 border-t-transparent mb-4"></div>
            <p class="text-slate-300 font-bold">טוען ומסנכרן את נתוני המבחנים מכל השכבות...</p>
        </div>

        <!-- הצגת שגיאה -->
        <div x-show="error" x-cloak class="bg-rose-950/30 border border-rose-900/50 rounded-2xl p-6 mb-6 text-rose-300 flex items-start gap-3">
            <i class="fa-solid fa-circle-exclamation text-xl shrink-0 mt-0.5"></i>
            <div>
                <h4 class="font-bold text-md mb-1">שגיאה בסנכרון הקובץ</h4>
                <p class="text-sm opacity-90" x-text="error"></p>
            </div>
        </div>

        <!-- אזור רשימת המבחנים הכרונולוגית -->
        <div x-show="!loading && !error" x-cloak class="space-y-4">
            <template x-for="event in filteredEvents" :key="event.dateStr + '-' + event.grade">
                <div class="bg-slate-900 border border-slate-800/80 rounded-2xl p-5 hover:border-indigo-500/30 transition duration-200 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                    <div class="flex items-start gap-4 flex-1">
                        <!-- תאריך -->
                        <div class="bg-slate-800 border border-slate-700/80 rounded-xl p-2.5 text-center min-w-[85px] shrink-0 shadow-inner">
                          <span class="text-[11px] text-slate-400 block font-medium" x-text="event.day"></span>
                          <span class="text-sm font-extrabold text-indigo-300 tracking-wider" x-text="formatDateShort(event.dateStr)"></span>
                        </div>

                        <!-- פירוט האירוע -->
                        <div class="space-y-2 flex-1">
                            <div class="flex flex-wrap gap-2 items-center">
                                <!-- תגית שכבה -->
                                <span class="inline-flex items-center gap-1 text-[11px] font-bold bg-indigo-950/60 text-indigo-300 border border-indigo-800/50 px-2.5 py-0.5 rounded-full">
                                    <i class="fa-solid fa-graduation-cap"></i>
                                    <span x-text="'שכבת ' + event.grade"></span>
                                </span>

                                <!-- תגית חג/חופשה (במידה וקיים ונבחר להצגה) -->
                                <template x-if="event.holiday">
                                    <span class="inline-flex items-center gap-1 text-[11px] font-bold bg-amber-950/60 text-amber-300 border border-amber-800/50 px-2.5 py-0.5 rounded-full">
                                        <i class="fa-solid fa-umbrella-beach"></i>
                                        <span x-text="event.holiday"></span>
                                    </span>
                                </template>
                            </div>

                            <!-- רשימת הבחינות לאותו היום -->
                            <div class="space-y-2 pt-1">
                                <template x-for="exam in getExamsForDay(event)" :key="exam.className">
                                    <div class="text-sm font-bold text-slate-200 flex items-center gap-2.5 bg-slate-800/30 border border-slate-800 px-3 py-2 rounded-xl">
                                        <i class="fa-solid fa-file-signature text-indigo-400 shrink-0"></i>
                                        <span>
                                            מבחן ב-<span class="text-indigo-200" x-text="exam.subject"></span>
                                            <span class="text-slate-400 text-xs font-normal" x-text="'(' + exam.className + ')'"></span>
                                        </span>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>
                </div>
            </template>
            
            <!-- הודעה כשאין מבחנים להצגה -->
            <template x-if="filteredEvents.length === 0">
                <div class="bg-slate-900 border border-slate-800/80 rounded-2xl p-12 text-center text-slate-400">
                    <i class="fa-solid fa-calendar-xmark text-2xl mb-2 text-slate-600"></i>
                    <p class="font-semibold text-slate-300">לא נמצאו מבחנים או אירועים מתאימים.</p>
                    <p class="text-xs text-slate-500 mt-1">נסו לשנות את הגדרות הסינון או להפעיל את הצגת החגים והחופשות.</p>
                </div>
            </template>
        </div>

    </main>

    <!-- פוטר נקי -->
    <footer class="border-t border-slate-900 mt-12 bg-slate-950 py-6 text-center text-xs text-slate-600">
        <p>מערכת ה-LOOKER השכבתית • מועצת תלמידים ונהלים פדגוגיים</p>
    </footer>

    <!-- JS Logic -->
    <script>
        function app() {
            return {
                spreadsheetId: "1TIwnott9Y7pTugeQ5Il-U00dUe5GE6Mcc7lRqfxuCBM",
                grades: [
                    { id: 'ט', name: "שכבת ט'" },
                    { id: 'י', name: "שכבת י'" },
                    { id: 'יא', name: "שכבת יא'" },
                    { id: 'יב', name: "שכבת יב'" }
                ],
                selectedGrade: 'כלל בית הספר',
                selectedClass: 'כל השכבה',
                showHolidays: false, // ברירת מחדל: לא מציגים חגים וחופשות
                loading: true,
                error: null,
                lastRefreshed: null,
                
                allEvents: [],
                gradeClasses: { 'ט': [], 'י': [], 'יא': [], 'יב': [] },
                filteredEvents: [],

                initApp() {
                    this.fetchData();
                    setInterval(() => this.fetchData(), 1800000); // רענון חצי-שעתי אוטומטי
                },

                get isClassDisabled() {
                    return this.selectedGrade === 'כלל בית הספר';
                },

                async fetchData(force = false) {
                    this.loading = true;
                    this.error = null;

                    try {
                        const fetchPromises = this.grades.map(async (grade) => {
                            const url = `https://docs.google.com/spreadsheets/d/${this.spreadsheetId}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(grade.name)}`;
                            const response = await fetch(url);
                            if (!response.ok) throw new Error(`נכשל בטעינת ${grade.name}`);
                            const csvText = await response.text();
                            
                            const rows = parseCSV(csvText);
                            if (rows.length < 2) return;

                            const headers = rows[0].map(h => h ? h.trim() : '');
                            
                            // איתור עמודות קריטיות בשיטה דינמית
                            const dateIdx = headers.findIndex(h => h.includes('תאריך') || h.toLowerCase().includes('date'));
                            const dayIdx = headers.findIndex(h => h.includes('יום') || h.toLowerCase().includes('day'));
                            
                            // חיפוש עמודת חג / אירוע
                            let holidayIdx = headers.findIndex(h => h.includes('חג') || h.includes('חופש') || h.includes('אירוע') || h.toLowerCase().includes('holiday'));
                            if (holidayIdx === -1) {
                                holidayIdx = 3; // ברירת מחדל לעמודה הרביעית (עמודה D)
                            }

                            // מיפוי עמודות הכיתות (מעמודה 5 ואילך)
                            const classCols = [];
                            this.gradeClasses[grade.id] = [];
                            const startSearchClassIdx = Math.max(4, holidayIdx + 1);
                            
                            for (let i = startSearchClassIdx; i < headers.length; i++) {
                                if (headers[i] && headers[i].trim() !== '') {
                                    classCols.push({ index: i, name: headers[i].trim() });
                                    this.gradeClasses[grade.id].push(headers[i].trim());
                                }
                            }

                            const getVal = (row, idx) => idx !== -1 && row[idx] ? row[idx].trim() : '';

                            const events = rows.slice(1)
                                .filter(row => row.length > 1 && row[dateIdx])
                                .map(row => {
                                    const dateStr = getVal(row, dateIdx);
                                    let parsedDate = null;
                                    if (dateStr) {
                                        const parts = dateStr.split(/[\/\-\.]/);
                                        if (parts.length >= 2) {
                                            const day = parseInt(parts[0], 10);
                                            const month = parseInt(parts[1], 10) - 1;
                                            const year = parts[2] ? parseInt(parts[2], 10) : new Date().getFullYear();
                                            const fullYear = year < 100 ? 2000 + year : year;
                                            parsedDate = new Date(fullYear, month, day);
                                        }
                                    }

                                    // איתור שיבוצי מבחנים לכיתות השונות ביום זה
                                    let hasExam = false;
                                    const exams = {};
                                    classCols.forEach(col => {
                                        const examSub = row[col.index] ? row[col.index].trim() : '';
                                        if (examSub) {
                                            hasExam = true;
                                            exams[col.name] = examSub;
                                        }
                                    });

                                    const holidayText = getVal(row, holidayIdx);

                                    // מסננים החוצה ימים ריקים לגמרי (ללא מבחן וללא חג כלל)
                                    if (!hasExam && !holidayText) {
                                        return null;
                                    }

                                    return {
                                        grade: grade.id,
                                        dateStr,
                                        date: parsedDate,
                                        day: getVal(row, dayIdx),
                                        holiday: holidayText,
                                        exams
                                    };
                                });

                            return events.filter(Boolean);
                        });

                        const results = await Promise.all(fetchPromises);
                        this.allEvents = results.flat().filter(Boolean);
                        
                        this.lastRefreshed = new Date().toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' });
                        this.updateData();
                    } catch (err) {
                        console.error(err);
                        this.error = "לא הצלחנו למשוך את הנתונים ישירות מהקובץ. ודאו שהקובץ פתוח לשיתוף ציבורי ואינו חסום.";
                    } finally {
                        this.loading = false;
                    }
                },

                get availableClasses() {
                    if (this.selectedGrade === 'כלל בית הספר') return [];
                    return this.gradeClasses[this.selectedGrade] || [];
                },

                onGradeChange() {
                    this.selectedClass = 'כל השכבה';
                    this.updateData();
                },

                updateData() {
                    let tempEvents = [];

                    this.allEvents.forEach(event => {
                        // 1. סינון לפי שכבה
                        if (this.selectedGrade !== 'כלל בית הספר' && event.grade !== this.selectedGrade) {
                            return;
                        }

                        // 2. מיפוי ובדיקת התאמת מבחנים לפי כיתה ספציפית
                        let matchedExams = {};
                        if (this.selectedGrade === 'כלל בית הספר' || this.selectedClass === 'כל השכבה') {
                            matchedExams = event.exams;
                        } else {
                            if (event.exams[this.selectedClass]) {
                                matchedExams[this.selectedClass] = event.exams[this.selectedClass];
                            }
                        }

                        const hasMatchingExams = Object.keys(matchedExams).length > 0;
                        const hasHoliday = !!event.holiday;

                        // 3. החלטה האם להציג את היום לפי תיבת הסימון (צ'קבוקס חגים)
                        let shouldDisplay = false;
                        if (this.showHolidays) {
                            shouldDisplay = hasMatchingExams || hasHoliday;
                        } else {
                            shouldDisplay = hasMatchingExams;
                        }

                        if (shouldDisplay) {
                            tempEvents.push({
                                ...event,
                                matchedExams // נשמור את המבחנים שעברו את הסינון להצגה ממוקדת
                            });
                        }
                    });

                    // מיון כרונולוגי של הלוח
                    tempEvents.sort((a, b) => {
                        if (!a.date) return 1;
                        if (!b.date) return -1;
                        return a.date - b.date;
                    });

                    this.filteredEvents = tempEvents;
                },

                getExamsForDay(event) {
                    if (!event || !event.matchedExams) return [];
                    return Object.entries(event.matchedExams).map(([cls, sub]) => ({
                        className: cls,
                        subject: sub
                    }));
                },

                formatDateShort(dateStr) {
                    if (!dateStr) return '';
                    const parts = dateStr.split(/[\/\-\.]/);
                    if (parts.length >= 2) {
                        return `${parts[0]}/${parts[1]}`;
                    }
                    return dateStr;
                }
            };
        }

        // פארסר CSV אמין ותקני
        function parseCSV(text) {
            const lines = [];
            let row = [""];
            let insideQuote = false;

            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const nextChar = text[i + 1];

                if (char === '"') {
                    if (insideQuote && nextChar === '"') {
                        row[row.length - 1] += '"';
                        i++;
                    } else {
                        insideQuote = !insideQuote;
                    }
                } else if (char === ',' && !insideQuote) {
                    row.push('');
                } else if ((char === '\r' || char === '\n') && !insideQuote) {
                    if (char === '\r' && nextChar === '\n') i++;
                    lines.push(row);
                    row = [""];
                } else {
                    row[row.length - 1] += char;
                }
            }
            if (row.length > 1 || row[0] !== '') {
                lines.push(row);
            }
            return lines;
        }
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>לוח בחינות ואירועים - תיכון דרכא</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Alpine.js -->
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <!-- Google Visualization API -->
    <script src="https://www.gstatic.com/charts/loader.js"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Heebo', sans-serif; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen" x-data="examsApp()">

    <!-- Header Section -->
    <header class="border-b border-gray-800 bg-gray-900/50 backdrop-blur-md sticky top-0 z-50 px-4 py-4">
        <div class="max-w-5xl mx-auto flex flex-col md:flex-row md:items-center md:justify-between gap-4">
            
            <!-- Logo and Title -->
            <div class="flex items-center gap-4">
                <div class="bg-white p-1.5 rounded-xl shadow-lg max-w-[150px] md:max-w-[180px]">
                    <img src="לוגו דרכא רקע לבן (1).jpeg" alt="תיכון דרכא" class="w-full h-auto object-contain">
                </div>
                <div>
                    <h1 class="text-xl md:text-2xl font-bold tracking-tight text-white">לוח בחינות ואירועים</h1>
                </div>
            </div>

            <!-- Filters Grid -->
            <div class="flex flex-wrap items-center gap-3 bg-gray-900 p-2 rounded-xl border border-gray-800/80 w-full md:w-auto">
                <!-- Dropdown: Layer -->
                <div class="flex-1 sm:flex-initial min-w-[120px]">
                    <select x-model="selectedLayer" @change="handleLayerChange()" class="w-full bg-gray-800 text-sm rounded-lg border border-gray-700 px-3 py-2 text-white focus:outline-none focus:border-emerald-500 transition">
                        <option value="all">כלל בית הספר</option>
                        <option value="ט">שכבת ט'</option>
                        <option value="י">שכבת י'</option>
                        <option value="יא">שכבת יא'</option>
                        <option value="יב">שכבת יב'</option>
                    </select>
                </div>

                <!-- Dropdown: Class -->
                <div class="flex-1 sm:flex-initial min-w-[100px]">
                    <select x-model="selectedClass" :disabled="selectedLayer === 'all'" class="w-full bg-gray-800 text-sm rounded-lg border border-gray-700 px-3 py-2 text-white focus:outline-none focus:border-emerald-500 transition disabled:opacity-40 disabled:cursor-not-allowed">
                        <option value="all">כל השכבה</option>
                        <template x-for="cls in availableClasses" :key="cls">
                            <option :value="cls" x-text="cls"></option>
                        </template>
                    </select>
                </div>

                <!-- Input: Search -->
                <div class="w-full sm:w-48 relative">
                    <input type="text" x-model="searchQuery" placeholder="חיפוש חופשי..." class="w-full bg-gray-800 text-sm rounded-lg border border-gray-700 pr-8 pl-3 py-2 text-white placeholder-gray-500 focus:outline-none focus:border-emerald-500 transition">
                    <span class="absolute right-2.5 top-2.5 text-gray-500">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </span>
                </div>

                <!-- Toggle: Holidays -->
                <label class="flex items-center gap-2 cursor-pointer select-none px-2 py-1.5 rounded-lg hover:bg-gray-800/60 transition">
                    <input type="checkbox" x-model="showHolidays" class="rounded border-gray-700 text-emerald-500 bg-gray-800 focus:ring-0 focus:ring-offset-0 w-4 h-4">
                    <span class="text-xs font-medium text-gray-300">הצג חגים וחופשות</span>
                </label>
            </div>

        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-5xl mx-auto px-4 py-6">
        
        <!-- Loading & Errors States -->
        <div x-show="loading" class="flex flex-col items-center justify-center py-20 gap-3">
            <div class="w-8 h-8 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin"></div>
            <p class="text-gray-400 text-sm">טוען נתונים ומסנכרן את הלוח...</p>
        </div>

        <div x-show="!loading && error" class="bg-red-950/40 border border-red-800/60 text-red-200 p-4 rounded-xl text-center" x-text="error" x-cloak></div>

        <!-- Empty State -->
        <div x-show="!loading && filteredEvents.length === 0" class="text-center py-16 bg-gray-900/20 border border-gray-800/60 rounded-xl" x-cloak>
            <p class="text-gray-400">לא נמצאו בחינות או אירועים העונים על סינון זה.</p>
        </div>

        <!-- List Layout -->
        <div x-show="!loading && filteredEvents.length > 0" class="space-y-2" x-cloak>
            <template x-for="event in filteredEvents" :key="event.id">
                <div class="flex items-center justify-between gap-4 p-3 bg-gray-900/60 hover:bg-gray-900 border border-gray-800 hover:border-gray-700/80 rounded-xl transition duration-150">
                    
                    <!-- Right: Unified Date & Day Box -->
                    <div class="flex items-center gap-2 bg-gray-800/80 border border-gray-700 px-3 py-1.5 rounded-lg shrink-0 text-xs sm:text-sm font-medium text-gray-200">
                        <span x-text="event.formattedDate"></span>
                        <span class="text-gray-500 font-normal">|</span>
                        <span x-text="event.dayOfWeek" class="text-emerald-400 font-bold"></span>
                    </div>

                    <!-- Center: Subject Text -->
                    <div class="flex-1 min-w-0 text-right">
                        <span class="text-sm sm:text-base text-gray-100 font-medium block truncate" :title="event.title" x-text="event.title"></span>
                    </div>

                    <!-- Left: Targeting Tag (Class / Layer) -->
                    <div class="shrink-0">
                        <span :class="event.isHoliday ? 'bg-amber-500/10 text-amber-400 border-amber-500/20' : 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20'" 
                              class="text-xs font-semibold px-2.5 py-1 rounded-md border" 
                              x-text="event.targetDisplay">
                        </span>
                    </div>

                </div>
            </template>
        </div>
    </main>

    <script>
        function examsApp() {
            return {
                spreadsheetId: '1m94B_W5KlsA9-wGgP8fLz_b678B3Y48I9bT9GZp8vjE', // מזהה קובץ הגוגל שיטס שלכם
                loading: true,
                error: null,
                allEvents: [],
                availableClasses: [],
                selectedLayer: 'all',
                selectedClass: 'all',
                searchQuery: '',
                showHolidays: false,

                init() {
                    google.charts.load('current', {'packages':['corechart']});
                    google.charts.setOnLoadCallback(() => this.fetchAllLayers());
                },

                async fetchAllLayers() {
                    this.loading = true;
                    this.error = null;
                    const layers = [
                        { name: 'ט', tab: 'שכבת ט' },
                        { name: 'י', tab: 'שכבת י' },
                        { name: 'יא', tab: 'שכבת יא' },
                        { name: 'יב', tab: 'שכבת יב' }
                    ];

                    try {
                        let promises = layers.map(layer => this.fetchLayerData(layer.name, layer.tab));
                        let results = await Promise.all(promises);
                        this.allEvents = results.flat().sort((a, b) => a.dateObj - b.dateObj);
                    } catch (err) {
                        this.error = 'שגיאה במשיכת הנתונים. ודא שקובץ הגוגל שיטס ציבורי ופתוח לצפייה.';
                    } finally {
                        this.loading = false;
                    }
                },

                fetchLayerData(layerName, tabName) {
                    return new Promise((resolve, reject) => {
                        const queryUrl = `https://docs.google.com/spreadsheets/d/${this.spreadsheetId}/gviz/tq?sheet=${encodeURIComponent(tabName)}&tq=SELECT*`;
                        const query = new google.visualization.Query(queryUrl);

                        query.send(response => {
                            if (response.isError()) return resolve([]);
                            
                            const dataTable = response.getDataTable();
                            const numRows = dataTable.getNumberOfRows();
                            const parsedEvents = [];

                            for (let i = 0; i < numRows; i++) {
                                const dateValue = dataTable.getValue(i, 0); // עמודה A: תאריך
                                const dayValue = dataTable.getValue(i, 1);  // עמודה B: יום בשבוע
                                const testValue = dataTable.getValue(i, 6); // עמודה G: מבחן

                                if (!dateValue || !testValue) continue;

                                let rawDate = this.parseGoogleDate(dateValue);
                                if (!rawDate) continue;

                                const isHoliday = String(testValue).includes('חופש') || String(testValue).includes('חג');

                                // סריקת עמודות הכיתות (C, D, E, F) לבדיקת שיבוץ ייחודי
                                let targetClasses = [];
                                for (let col = 2; col <= 5; col++) {
                                    let cellVal = dataTable.getValue(i, col);
                                    if (cellVal && String(cellVal).trim() !== '') {
                                        let colLabel = dataTable.getColumnLabel(col) || `${layerName}${col-1}`;
                                        targetClasses.push(colLabel);
                                    }
                                }

                                // בניית תגית הייעוד (שכבה מול כיתה ספציפית)
                                let targetDisplay = `שכבת ${layerName}'`;
                                let specificClass = 'all';
                                if (targetClasses.length === 1) {
                                    targetDisplay = targetClasses[0];
                                    specificClass = targetClasses[0];
                                }

                                parsedEvents.push({
                                    id: `${layerName}-${i}-${rawDate.getTime()}`,
                                    dateObj: rawDate,
                                    formattedDate: this.formatDate(rawDate),
                                    dayOfWeek: dayValue || this.getDayName(rawDate),
                                    title: String(testValue).trim(),
                                    layer: layerName,
                                    specificClass: specificClass,
                                    isHoliday: isHoliday,
                                    targetDisplay: isHoliday ? 'חופשה / מועד' : targetDisplay
                                });
                            }
                            resolve(parsedEvents);
                        });
                    });
                },

                handleLayerChange() {
                    this.selectedClass = 'all';
                    if (this.selectedLayer === 'all') {
                        this.availableClasses = [];
                        return;
                    }
                    // מיפוי דינמי של כיתות ייחודיות הקיימות בשכבה שנבחרה
                    let classesSet = new Set();
                    this.allEvents
                        .filter(e => e.layer === this.selectedLayer && e.specificClass !== 'all')
                        .forEach(e => classesSet.add(e.specificClass));
                    
                    this.availableClasses = Array.from(classesSet).sort();
                },

                get filteredEvents() {
                    return this.allEvents.filter(event => {
                        // סינון ברירת מחדל של חגים וחופשות
                        if (!this.showHolidays && event.isHoliday) return false;

                        // סינון לפי שכבה
                        if (this.selectedLayer !== 'all' && event.layer !== this.selectedLayer) return false;

                        // סינון לפי כיתה ספציפית
                        if (this.selectedClass !== 'all' && event.specificClass !== 'all' && event.specificClass !== this.selectedClass) return false;

                        // סינון לפי חיפוש טקסט חופשי
                        if (this.searchQuery.trim() !== '') {
                            const query = this.searchQuery.toLowerCase();
                            return event.title.toLowerCase().includes(query) || 
                                   event.targetDisplay.toLowerCase().includes(query) ||
                                   event.formattedDate.includes(query);
                        }

                        return true;
                    });
                },

                parseGoogleDate(dateVal) {
                    if (dateVal instanceof Date) return dateVal;
                    if (typeof dateVal === 'string') {
                        if (dateVal.startsWith('Date(')) {
                            let parts = dateVal.match(/\d+/g);
                            if (parts) return new Date(parts[0], parts[1], parts[2]);
                        }
                        let timestamp = Date.parse(dateVal);
                        if (!isNaN(timestamp)) return new Date(timestamp);
                    }
                    return null;
                },

                formatDate(date) {
                    return date.toLocaleDateString('he-IL', { day: '2-digit', month: '2-digit', year: '2-digit' });
                },

                getDayName(date) {
                    return date.toLocaleDateString('he-IL', { weekday: 'short' });
                }
            }
        }
    </script>
</body>
</html>
